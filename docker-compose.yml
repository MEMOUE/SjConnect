services:
  # ==========================================
  # TRAEFIK - REVERSE PROXY + SSL
  # ==========================================
  traefik:
    image: traefik:latest
    container_name: duniya-traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.45
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirection HTTP → HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      # Let's Encrypt — HTTP challenge (plus fiable que TLS challenge)
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      # Logs pour debug certificats (à retirer une fois OK)
      - --log.level=INFO
      - --accesslog=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - duniya-network

  # ==========================================
  # BACKEND SPRING BOOT
  # ==========================================
  backend:
    build:
      context: ./DuniyaBacker
      dockerfile: Dockerfile
    container_name: duniya-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    extra_hosts:
      - "mail.duniyaconnect.com:2a00:7ee0:9:3:40:1:0:11c"
    environment:
      # Base de données
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      # JWT & CORS
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # Email custom vars
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      # EMAIL_SECRETARIAT: ${EMAIL_SECRETARIAT}
      # Forcer la config mail Spring Boot
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: "587"
      SPRING_MAIL_USERNAME: memko021@gmail.com
      SPRING_MAIL_PASSWORD: ${EMAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST: "*"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_CHECKSERVERIDENTITY: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      # Uploads
      UPLOAD_DIR_ACTUALITES: ${UPLOAD_DIR_ACTUALITES}
      UPLOAD_DIR_DIRECTEURS: ${UPLOAD_DIR_DIRECTEURS}
      # Système
      TZ: ${TZ}
      JAVA_OPTS: ${JAVA_OPTS}
      DOMAIN_FRONTEND: ${DOMAIN_FRONTEND}
    volumes:
      - ./uploads/actualites:/app/uploads/actualites
      - ./uploads/directeurs:/app/uploads/directeurs
      - ./logs:/app/logs
    networks:
      - duniya-network
    labels:
      - "traefik.enable=true"
      # Router backend — API, Swagger, WebSocket
      - "traefik.http.routers.backend.rule=(Host(`duniyaconnect.com`) || Host(`www.duniyaconnect.com`)) && (PathPrefix(`/api`) || PathPrefix(`/swagger-ui`) || PathPrefix(`/v3/api-docs`) || PathPrefix(`/ws`) || PathPrefix(`/uploads`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=le"
      - "traefik.http.routers.backend.priority=100"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      # SAN : certificat couvre les deux domaines
      - "traefik.http.routers.backend.tls.domains[0].main=duniyaconnect.com"
      - "traefik.http.routers.backend.tls.domains[0].sans=www.duniyaconnect.com"

  # ==========================================
  # FRONTEND ANGULAR
  # ==========================================
  frontend:
    build:
      context: ./DouniyaFrontend
      dockerfile: Dockerfile
    container_name: duniya-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - duniya-network
    labels:
      - "traefik.enable=true"
      # Router frontend — pages Angular
      - "traefik.http.routers.frontend.rule=Host(`duniyaconnect.com`) || Host(`www.duniyaconnect.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      # SAN : même certificat pour les deux domaines
      - "traefik.http.routers.frontend.tls.domains[0].main=duniyaconnect.com"
      - "traefik.http.routers.frontend.tls.domains[0].sans=www.duniyaconnect.com"
      # Middleware : rediriger www → non-www (optionnel mais recommandé)
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.duniyaconnect\\.com/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://duniyaconnect.com/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.frontend.middlewares=www-redirect"

  # ==========================================
  # PHPMYADMIN
  # ==========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: duniya-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: duniya-mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - duniya-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.duniyaconnect.com`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls=true"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=le"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"

  # ==========================================
  # MYSQL
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: duniya-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - duniya-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
  letsencrypt:

networks:
  duniya-network:
    driver: bridge