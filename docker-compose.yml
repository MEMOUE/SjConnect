services:
  # ==========================================
  # TRAEFIK - REVERSE PROXY + SSL
  # ==========================================
  traefik:
    image: traefik:v2.10
    container_name: duniya-traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirection HTTP → HTTPS (MANQUAIT)
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - duniya-network

  # ==========================================
  # BACKEND SPRING BOOT
  # ==========================================
  backend:
    build:
      context: ./duniyaBackend
      dockerfile: Dockerfile
    container_name: duniya-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_SECRETARIAT: ${EMAIL_SECRETARIAT}
      UPLOAD_DIR_ACTUALITES: ${UPLOAD_DIR_ACTUALITES}
      UPLOAD_DIR_DIRECTEURS: ${UPLOAD_DIR_DIRECTEURS}
      TZ: ${TZ}
      JAVA_OPTS: ${JAVA_OPTS}
    volumes:
      - ./uploads/actualites:/app/uploads/actualites
      - ./uploads/directeurs:/app/uploads/directeurs
      - ./logs:/app/logs
    networks:
      - duniya-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN_BACKEND}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  # ==========================================
  # FRONTEND ANGULAR
  # ==========================================
  frontend:
    build:
      context: ./duniyaFrontend
      dockerfile: Dockerfile
    container_name: duniya-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - duniya-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN_FRONTEND}`,`www.${DOMAIN_FRONTEND}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # ==========================================
  # PHPMYADMIN
  # ==========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: duniya-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: duniya-mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - duniya-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`${DOMAIN_PHPMYADMIN}`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"

  # ==========================================
  # MYSQL
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: duniya-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - duniya-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
  letsencrypt:

networks:
  duniya-network:
    driver: bridge