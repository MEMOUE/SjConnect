services:
  traefik:
    image: traefik:v2.10
    container_name: iub-traefik
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=memko021@gmail.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - iub-network

  frontend:
    build:
      context: ./iubFrontend   # ⚠️ vérifie bien le nom du dossier (tu avais "iubFonten" par erreur)
      dockerfile: Dockerfile
    container_name: iub-frontend
    expose:
      - "80"
    networks:
      - iub-network
    labels:
      - "traefik.enable=true"
      # Frontend disponible sur le domaine principal
      - "traefik.http.routers.frontend.rule=Host(`iub-university.com`,`www.iub-university.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  backend:
    build:
      context: ./iubBakend   # ✅ corrigé
      dockerfile: Dockerfile
    container_name: iub-backend
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/iub_db
      - SPRING_DATASOURCE_USERNAME=user_iub
      - SPRING_DATASOURCE_PASSWORD=iub@2022
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=https://iub-university.com,https://www.iub-university.com,https://api.iub-university.com
    networks:
      - iub-network
    labels:
      - "traefik.enable=true"
      # API sur api.iub-university.com
      - "traefik.http.routers.backend-api.rule=Host(`api.iub-university.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend-api.entrypoints=websecure"
      - "traefik.http.routers.backend-api.tls.certresolver=le"
      # API aussi via iub-university.com/api
      - "traefik.http.routers.backend-main.rule=Host(`iub-university.com`,`www.iub-university.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend-main.entrypoints=websecure"
      - "traefik.http.routers.backend-main.tls.certresolver=le"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: iub-phpmyadmin
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: Memko@2022
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.iub-university.com`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=le"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
    networks:
      - iub-network

  mysql:
    image: mysql:8.0
    container_name: iub-mysql
    environment:
      MYSQL_DATABASE: iub_db
      MYSQL_USER: user_iub
      MYSQL_PASSWORD: iub@ 
      MYSQL_ROOT_PASSWORD: Memko@2022
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - iub-network

volumes:
  mysql-data:
  letsencrypt:

networks:
  iub-network:
    driver: bridge