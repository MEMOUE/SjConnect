server {
    listen 80;
    server_name duniyaconnect.com www.duniyaconnect.com;

    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA : fallback vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend Spring Boot
    location /api/ {
        proxy_pass http://duniya-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout pour requêtes longues
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }

    # Fichiers statiques avec cache longue durée
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fichiers statiques spécifiques
    location ~ ^/(favicon\.ico|logo\.png|logo2\.png)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Sécurité de base
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Masquer la version Nginx
    server_tokens off;
}
